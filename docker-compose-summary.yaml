# Docker Compose file for Summary Services
# Use this to start the summary system components
version: '3.8'

services:
  # Kafka Producer Service
  summary-producer:
    build:
      context: .
      dockerfile: Dockerfile.summary
    container_name: summary-producer
    restart: unless-stopped
    environment:
      - ZULIP_EMAIL=${SUMMARY_BOT_EMAIL}
      - ZULIP_API_KEY=${SUMMARY_BOT_API_KEY}
      - ZULIP_SERVER=${ZULIP_SERVER_URL}
      - KAFKA_SERVERS=localhost:9092
    depends_on:
      - kafka
      - zookeeper
    networks:
      - zulip-network
    volumes:
      - ./kafka_summary_producer.py:/app/kafka_summary_producer.py
      - ./requirements_kafka.txt:/app/requirements_kafka.txt
    command: python kafka_summary_producer.py --zulip-email $$ZULIP_EMAIL --zulip-api-key $$ZULIP_API_KEY --zulip-server $$ZULIP_SERVER --kafka-servers $$KAFKA_SERVERS

  # Kafka Consumer Service (Summary Generation)
  summary-consumer:
    build:
      context: .
      dockerfile: Dockerfile.summary
    container_name: summary-consumer
    restart: unless-stopped
    environment:
      - KAFKA_SERVERS=localhost:9092
      - GEMINI_API_KEY_FILE=/run/secrets/gemikey
      - OLLAMA_URL=http://host.docker.internal:11434
      - USE_OLLAMA=true
    depends_on:
      - kafka
      - zookeeper
    networks:
      - zulip-network
    secrets:
      - gemikey
    volumes:
      - ./kafka_summary_consumer.py:/app/kafka_summary_consumer.py
      - ./requirements_kafka.txt:/app/requirements_kafka.txt
      - ./.env:/app/.env:ro
    command: python kafka_summary_consumer.py --kafka-servers $$KAFKA_SERVERS

  # Summary Notification Bot
  summary-bot:
    build:
      context: .
      dockerfile: Dockerfile.summary
    container_name: summary-bot
    restart: unless-stopped
    environment:
      - ZULIP_EMAIL=${SUMMARY_BOT_EMAIL}
      - ZULIP_API_KEY=${SUMMARY_BOT_API_KEY}
      - ZULIP_SERVER=${ZULIP_SERVER_URL}
      - KAFKA_SERVERS=localhost:9092
    depends_on:
      - kafka
      - zookeeper
    networks:
      - zulip-network
    volumes:
      - ./summary_bot.py:/app/summary_bot.py
      - ./requirements_kafka.txt:/app/requirements_kafka.txt
    command: python summary_bot.py --zulip-email $$ZULIP_EMAIL --zulip-api-key $$ZULIP_API_KEY --zulip-server $$ZULIP_SERVER --kafka-servers $$KAFKA_SERVERS

networks:
  zulip-network:
    external: true

secrets:
  gemikey:
    file: ./.env
